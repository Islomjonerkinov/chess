<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chess Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="chess-king-regular-full.svg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

</head>

<body class="h-screen overflow-hidden flex antialiased selection:bg-neutral-800">
    <!-- Sidebar -->
    <aside class="w-16 md:w-64 bg-[#0a0a0a] border-r border-neutral-900 flex flex-col shrink-0 transition-all duration-300 z-20 relative">
        <div class="h-16 flex items-center justify-center md:justify-start md:px-6 border-b border-neutral-900 shrink-0">
            <div class="font-semibold tracking-tighter text-xl text-neutral-100 flex items-center gap-2">
                <iconify-icon icon="solar:crown-minimalistic-linear" class="text-2xl md:hidden"></iconify-icon>
                <span class="hidden md:block">CHESS</span>
            </div>
        </div>


        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
            <button data-target="home" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 bg-neutral-900 border border-neutral-800 text-neutral-100 shadow-sm">
                <iconify-icon icon="solar:home-2-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                <span class="hidden md:block" data-i18n="navHome"><a href="index.html">Home</a></span>
            </button>
            <button data-target="news" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-500 hover:text-neutral-200 hover:bg-neutral-900/50 transition-all duration-200 border border-transparent">
                <iconify-icon icon="solar:document-text-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                <span class="hidden md:block" data-i18n="navNews" ><a href="news.html">News</a></span>
            </button>
            <button data-target="players" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-500 hover:text-neutral-200 hover:bg-neutral-900/50 transition-all duration-200 border border-transparent">
                <iconify-icon icon="solar:users-group-rounded-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                <span class="hidden md:block" data-i18n="navPlayers"><a href="players.html">Players</a></span>
            </button>
            <button data-target="leaderboard" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-500 hover:text-neutral-200 hover:bg-neutral-900/50 transition-all duration-200 border border-transparent">
                <iconify-icon icon="solar:cup-star-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                <span class="hidden md:block" data-i18n="navLeaderboard"><a href="leaderboard.html">Leaderboard</a></span>
            </button>
            <button data-target="profile" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-500 hover:text-neutral-200 hover:bg-neutral-900/50 transition-all duration-200 border border-transparent">
                <iconify-icon icon="solar:user-linear" stroke-width="1.5" class="text-lg"></iconify-icon>
                <span class="hidden md:block" data-i18n="navProfile"><a href="profile.html">Profile</a></span>
            </button>
        </nav>
        <a href="https://home-page-pied-nine.vercel.app/" class="home-btn">
            <span class="home-btn-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </span>
            <span>Home page</span>
            <span class="home-btn-arrow">↗</span>
        </a>

        <div class="p-4 border-t border-neutral-900 hidden md:block">
            <div class="bg-neutral-900 border border-neutral-800 rounded-xl p-4 text-center">
                <div class="text-xs font-medium text-neutral-400 mb-2" data-i18n="upgradeTitle">Upgrade to Pro</div>
                <button class="w-full bg-neutral-100 hover:bg-white text-black text-xs font-medium py-1.5 rounded-md transition-colors">
                    <span data-i18n="viewPlans">View Plans</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content Layout -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#000000]">

        <!-- Navbar -->
        <header class="h-16 flex items-center justify-between px-6 border-b border-neutral-900 shrink-0 bg-[#0a0a0a]/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center bg-neutral-900/50 border border-neutral-800 rounded-full px-3 py-1.5 w-48 md:w-80 focus-within:border-neutral-700 focus-within:bg-neutral-900 transition-colors">
                <iconify-icon icon="solar:magnifer-linear" stroke-width="1.5" class="text-neutral-500 text-lg mr-2"></iconify-icon>
                <input type="text" placeholder="Search..." data-i18n-placeholder="searchPlaceholder" class="bg-transparent text-sm text-neutral-200 w-full outline-none placeholder:text-neutral-600">
            </div>

            <div class="flex items-center gap-2 border-l border-neutral-900 pl-4 ml-4">
                <div class="hidden sm:flex items-center gap-2">
                    <button class="lang-switch px-2 py-1 rounded-full text-xs font-semibold tracking-wide border border-neutral-700 text-neutral-300 hover:bg-neutral-800 transition-colors" data-lang="en">EN</button>
                    <button class="lang-switch px-2 py-1 rounded-full text-xs font-semibold tracking-wide border border-neutral-700 text-neutral-300 hover:bg-neutral-800 transition-colors" data-lang="ru">RU</button>
                    <button class="lang-switch px-2 py-1 rounded-full text-xs font-semibold tracking-wide border border-neutral-700 text-neutral-300 hover:bg-neutral-800 transition-colors" data-lang="uz">UZ</button>
                </div>
                <button class="text-neutral-500 hover:text-neutral-200 transition-colors relative">
                    <iconify-icon icon="solar:bell-linear" stroke-width="1.5" class="text-xl"></iconify-icon>
                    <span
                        class="absolute top-0 right-0 w-2 h-2 bg-blue-500 rounded-full border border-[#0a0a0a]"></span>
                </button>
                <button class="w-8 h-8 rounded-full bg-neutral-800 border border-neutral-700 overflow-hidden hover:opacity-80 transition-opacity">
                    <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix" alt="Profile"
                        class="w-full h-full object-cover">
                </button>
            </div>
        </header>

        <!-- Dynamic Sections -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 relative">
            <section id="sec-leaderboard" class="content-section  fade-in max-w-4xl mx-auto">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold tracking-tight text-neutral-100 mb-2" data-i18n="globalLeaderboardTitle">Global Leaderboard</h2>
                    <p class="text-sm text-neutral-500" data-i18n="globalLeaderboardSubtitle">The highest rated active players this season.</p>
                </div>

                <div class="bg-[#0a0a0a] border border-neutral-800 rounded-xl overflow-hidden shadow-sm">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="bg-neutral-900/50 border-b border-neutral-800">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-medium text-neutral-500 uppercase tracking-wider w-16 text-center" data-i18n="leaderboardRank">
                                        Rank</th>
                                    <th class="px-6 py-4 text-xs font-medium text-neutral-500 uppercase tracking-wider" data-i18n="leaderboardPlayer">
                                        Player</th>
                                    <th class="px-6 py-4 text-xs font-medium text-neutral-500 uppercase tracking-wider text-right" data-i18n="leaderboardRating">
                                        Rating</th>
                                    <th class="px-6 py-4 text-xs font-medium text-neutral-500 uppercase tracking-wider text-right" data-i18n="leaderboardWinRate">
                                        Win Rate</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-neutral-800/50">
                                <tr class="hover:bg-neutral-900/30 transition-colors">
                                    <td class="px-6 py-4 text-center">
                                        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-amber-500/10 text-amber-500 font-semibold text-xs border border-amber-500/20">1</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Magnus" class="w-8 h-8 rounded-full bg-neutral-800">
                                            <span class="font-medium text-neutral-200">MagnusCarlsen</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-medium text-neutral-300">2882</td>
                                    <td class="px-6 py-4 text-right text-neutral-500">68.4%</td>
                                </tr>
                                <tr class="hover:bg-neutral-900/30 transition-colors">
                                    <td class="px-6 py-4 text-center">
                                        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-neutral-400/10 text-neutral-300 font-semibold text-xs border border-neutral-400/20">2</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Hikaru" class="w-8 h-8 rounded-full bg-neutral-800">
                                            <span class="font-medium text-neutral-200">Hikaru</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-medium text-neutral-300">2875</td>
                                    <td class="px-6 py-4 text-right text-neutral-500">65.2%</td>
                                </tr>
                                <tr class="hover:bg-neutral-900/30 transition-colors">
                                    <td class="px-6 py-4 text-center">
                                        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-600/10 text-orange-500 font-semibold text-xs border border-orange-600/20">3</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Ding" class="w-8 h-8 rounded-full bg-neutral-800">
                                            <span class="font-medium text-neutral-200">DingLiren</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-medium text-neutral-300">2811</td>
                                    <td class="px-6 py-4 text-right text-neutral-500">62.1%</td>
                                </tr>
                                <tr class="hover:bg-neutral-900/30 transition-colors">
                                    <td class="px-6 py-4 text-center text-neutral-600 text-xs font-medium">4</td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Fabi" class="w-8 h-8 rounded-full bg-neutral-800 opacity-80">
                                            <span class="font-medium text-neutral-400">FabianoCaruana</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-medium text-neutral-400">2804</td>
                                    <td class="px-6 py-4 text-right text-neutral-600">60.8%</td>
                                </tr>
                                <tr class="hover:bg-neutral-900/30 transition-colors">
                                    <td class="px-6 py-4 text-center text-neutral-600 text-xs font-medium">5</td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Nepo" class="w-8 h-8 rounded-full bg-neutral-800 opacity-80">
                                            <span class="font-medium text-neutral-400">Nepo</span>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-medium text-neutral-400">2795</td>
                                    <td class="px-6 py-4 text-right text-neutral-600">59.3%</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <script src="script.js"></script>

</body>

</html>
